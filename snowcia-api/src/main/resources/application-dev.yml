spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/snowcia
    username: postgres
    password: admin

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

security:
  jwt:
    secret: snowcia-development-secret-key-must-have-at-least-thirty-two-characters
    expiration-minutes: 60

app:
  bootstrap-admin:
    name: ${BOOTSTRAP_ADMIN_NAME:Snowcia Admin}
    email: ${BOOTSTRAP_ADMIN_EMAIL:}
    password: ${BOOTSTRAP_ADMIN_PASSWORD:}
